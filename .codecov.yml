codecov:
  require_ci_to_pass: yes
  # Wait for all 4 coverage uploads before sending notifications:
  #   1. backend          – pytest unit/integration  (backend.yml)
  #   2. frontend-unit    – vitest                   (frontend.yml)
  #   3. frontend-component – Playwright CT          (frontend.yml)
  #   4. frontend-e2e     – Istanbul via Playwright  (frontend-e2e.yml)
  # Carryforward flags let partial workflow runs still satisfy the threshold.
  notify:
    after_n_builds: 4
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        after_n_builds: 4
    patch:
      default:
        after_n_builds: 4
    changes: false

flags:
  backend:
    paths:
      - opencontractserver/
      - config/
    carryforward: true
  frontend-unit:
    paths:
      - frontend/src/
    carryforward: true
  frontend-component:
    paths:
      - frontend/src/
    carryforward: true
  frontend-e2e:
    paths:
      - frontend/src/
    carryforward: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no
  after_n_builds: 4

ignore:
  - "opencontractserver/tasks/data_extract_tasks.py"
  - "opencontractserver/tests/**"
  - "**/migrations/**"
  - "opencontractserver/**/migrations/*.py"
  - "opencontractserver/*/migrations/*.py"
  - "config/settings/test*.py"
  - "frontend/src/**/*.test.{ts,tsx}"
  - "frontend/src/setupTests.ts"
  - "frontend/tests/**"
  - "frontend/*.config.ts"
