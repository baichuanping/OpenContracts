[flake8]
extend-ignore = E203
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv
per-file-ignores =
    ./config/settings/local.py:F405
    ./config/settings/production.py:F405
    ./config/settings/base.py:F405
    ./config/settings/test.py:F405
    ./config/settings/test_integration.py:F405
    ./opencontractserver/tasks/doc_tasks.py: E203
    ./opencontractserver/utils/pdf_tools.py: E203,F401
    ./opencontractserver/tests/fixtures/__init__.py: F401

[pycodestyle]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv

[isort]
line_length = 88
known_first_party = opencontractserver,config
multi_line_output = 3
default_section = THIRDPARTY
skip = venv/
skip_glob = **/migrations/*.py
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
profile = black

[end-of-file-fixer]
exclude = frontend,staticfiles

[mypy]
python_version = 3.11
check_untyped_defs = True
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
plugins = mypy_django_plugin.main, mypy_drf_plugin.main

[mypy.plugins.django-stubs]
# Dedicated settings module that supplies a dummy DATABASE_URL default so
# contributors don't need env vars to run mypy. See config/settings/mypy.py.
django_settings_module = config.settings.mypy

[mypy-*.migrations.*]
# Django migrations should not produce any errors:
ignore_errors = True

# ---------------------------------------------------------------------------
# Baseline allow-list (issue #1331)
#
# The codebase currently has ~7.2k pre-existing type errors. Until each
# module is graduated into full checking, we suppress those errors so that
# the mypy pre-commit hook / CI step can gate against *regressions* rather
# than flooding contributors with legacy noise.
#
# See docs/typing/README.md for the graduation workflow. Move a module out
# of the baseline by narrowing the pattern (or dropping the override
# entirely) and fixing the errors that surface.
# ---------------------------------------------------------------------------
[mypy-opencontractserver.*]
ignore_errors = True

[mypy-config.*]
ignore_errors = True

[coverage:run]
include = opencontractserver/*
omit =
    *migrations*
    *tests*
    */temp_*
    */tmp_*
    */__pycache__/*
plugins =
    django_coverage_plugin

[coverage:report]
ignore_errors = True
skip_empty = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
