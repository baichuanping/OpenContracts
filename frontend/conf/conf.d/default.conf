server {
    listen 3000;

    # load standard MIME types and add .mjs mapping
    include mime.types;
    types {
        application/javascript  mjs;
    }

    # index.html must never be cached — it contains hashed JS/CSS references
    # that change on every build. Without this, browsers serve stale bundles.
    location = /index.html {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # Hashed assets (index-XXXXX.js) are immutable — cache aggressively
    location /assets/ {
        root   /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        expires -1;
    }
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
