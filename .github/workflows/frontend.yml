name: Frontend CI

defaults:
  run:
    working-directory: ./frontend

on:
  push:
    branches:
      - main
      - v*
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn

      - name: Clear Yarn Cache
        run: yarn cache clean

      - name: Install Dependencies
        run: yarn install --frozen-lockfile # Use frozen lockfile for CI

      - name: Lint Prettier
        run: yarn run lint

  component-test:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: lint # Run only if lint job passes
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install -g yarn # Still need global yarn

      - name: Clear Yarn Cache
        run: yarn cache clean

      - name: Install Dependencies
        run: yarn install --frozen-lockfile # Use frozen lockfile for CI

      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps

      - name: Run Playwright Component Tests with Coverage
        run: yarn run test:coverage:ct

      # Metadata tests already run with coverage above (included in *.ct.tsx).
      # This separate re-run without coverage catches flaky failures that
      # may have been masked by retries, without blocking the pipeline.
      - name: Re-run Metadata Component Tests (flakiness check)
        run: |
          yarn run test:ct --reporter=list tests/*Metadata*.ct.tsx
        continue-on-error: true

      - name: Upload CT Coverage to Codecov
        if: success() || failure()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/ct/lcov.info
          flags: frontend-component
          name: frontend-ct-coverage
          fail_ci_if_error: false

      # Publish the raw lcov so the cross-workflow merge job in
      # `codecov-notify.yml` can pull it via `actions/download-artifact` and
      # combine it with the unit + e2e lcovs into a single `frontend` flag.
      - name: Upload CT lcov artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-ct-lcov
          path: frontend/coverage/ct/lcov.info
          if-no-files-found: warn
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install Yarn
        run: npm install -g yarn
      - name: Clear Yarn Cache
        run: yarn cache clean
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Build TypeScript and Vite
        run: yarn build

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install Yarn
        run: npm install -g yarn
      - name: Clear Yarn Cache
        run: yarn cache clean
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Run Unit Tests with Coverage
        run: yarn run test:coverage:unit
      - name: Upload Unit Coverage to Codecov
        if: success() || failure()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/unit/lcov.info
          flags: frontend-unit
          name: frontend-unit-coverage
          fail_ci_if_error: false

      # Publish the raw lcov so the cross-workflow merge job in
      # `codecov-notify.yml` can pull it via `actions/download-artifact` and
      # combine it with the component + e2e lcovs into a single `frontend` flag.
      - name: Upload Unit lcov artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-unit-lcov
          path: frontend/coverage/unit/lcov.info
          if-no-files-found: warn
          retention-days: 7

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build Docker Image
        run: docker build -t opencontracts-frontend .
