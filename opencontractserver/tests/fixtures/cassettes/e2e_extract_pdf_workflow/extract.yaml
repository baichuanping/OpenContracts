      \ there is no Claim, suit, investigation, action or proceeding pending or threatened
      against ETON before any court, governmental agency, or arbitration panel which
      may in any way materially adversely affect the performance of its obligations
      hereunder or transaction contemplated by this Agreement\u037E\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":14,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"14\\\":{\\\"b\\\":[218.84299999999996,61.412,544.95,246.16099999999994],\\\"t\\\":\\\"255-297\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.030798389007344232},{\\\"annotation_id\\\":23205,\\\"content\\\":\\\"(a)
      ETON has the right to terminate this Agreement at any time at its sole discretion
      if the Dossier or marketing application for the Product is not approved by December
      31, 2020 or at a later time if agreed to in writing by the Parties.\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":13,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"13\\\":{\\\"b\\\":[67.34199999999998,50.05,544.95,84.55999999999995],\\\"t\\\":\\\"9-53\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.03076923076923077},{\\\"annotation_id\\\":23220,\\\"content\\\":\\\"12.1.3
      this Agreement is a legal, valid and binding agreement of ETON, enforceable
      in accordance with its terms, subject to applicable bankruptcy, insolvency,
      reorganization, moratorium, fraudulent transfer and other similar laws affecting
      creditors' rights generally from time to time in effect and to general principles
      of equity (including concepts of materiality, reasonableness, good faith and
      fair dealing), regardless of whether considered in a proceeding in equity or
      at law\u037E and\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":14,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"14\\\":{\\\"b\\\":[148.14300000000003,61.412,544.95,185.56100000000004],\\\"t\\\":\\\"137-206\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.02946236559139785},{\\\"annotation_id\\\":23129,\\\"content\\\":\\\"4.2
      If the terms of Aucta's commercial supply agreement with the active pharmaceutical
      ingredient supplier in Section 4.1 is assignable to ETON, ETON may assume the
      aforementioned agreement by providing written notice to Aucta, and Aucta will
      have seven (7) days from receipt of the notice to assign the aforementioned
      agreement to ETON.\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":5,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"5\\\":{\\\"b\\\":[290.80499999999995,50.05,544.95,318.12300000000005],\\\"t\\\":\\\"371-423\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.029437229437229435},{\\\"annotation_id\\\":23128,\\\"content\\\":\\\"4.1
      \ ETON shall enter into a commercial supply agreement with a contract manufacturing
      organization and Aucta shall enter into a commercial supply agreement with an
      active pharmaceutical ingredient supplier within ninety (90) days from the Execution
      Date unless otherwise agreed to by the parties in writing.\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":5,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"5\\\":{\\\"b\\\":[260.505,50.05,544.95,287.823],\\\"t\\\":\\\"325-370\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.027417840375586856},{\\\"annotation_id\\\":23206,\\\"content\\\":\\\"(b)
      ETON has the right to terminate this Agreement after approval of the Dossier
      or marketing application for the Product (or added new product), at its sole
      discretion, upon providing one hundred eighty (180) days' written notice to
      Aucta.\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":13,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"13\\\":{\\\"b\\\":[87.54200000000003,50.05,544.95,104.75999999999999],\\\"t\\\":\\\"54-92\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.027402402402402402},{\\\"annotation_id\\\":23192,\\\"content\\\":\\\"9.3
      Public Announcement. Neither ETON, Aucta nor any of their respective Affiliates
      shall issue any press release or make any public announcement with respect to
      this Agreement and the transactions contemplated hereby without obtaining the
      prior written consent of the other Party, except as may be required by Applicable
      Law or stock exchange rules on which a Party or its Affiliates stock trades.\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":11,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"11\\\":{\\\"b\\\":[138.673,50.05,544.95,165.99099999999999],\\\"t\\\":\\\"153-215\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.026973565905412694},{\\\"annotation_id\\\":23112,\\\"content\\\":\\\"2.2
      ETON, for itself and its Affiliates, hereby grants to Aucta in accordance with
      the terms and conditions of this Agreement, a right and license, to its trademark,
      including to its name and logo, that is owned or controlled by ETON or its Affiliates
      for Aucta (or its authorized Third Party) to make the packs, labels, and leaflets
      for the Products for sale in the Territory. For avoidance of doubt, ETON and
      its Affiliates shall remain the owner of its trademarks.\\\",\\\"document_id\\\":null,\\\"corpus_id\\\":81,\\\"page\\\":4,\\\"annotation_label\\\":\\\"text\\\",\\\"label\\\":\\\"text\\\",\\\"label_id\\\":334,\\\"json\\\":{\\\"p\\\":{\\\"4\\\":{\\\"b\\\":[181.59900000000005,50.05,544.95,219.01700000000005],\\\"t\\\":\\\"225-305\\\"}},\\\"v\\\":2},\\\"similarity_score\\\":0.026397515527950312}]\"},{\"role\":\"assistant\",\"content\":null,\"tool_calls\":[{\"id\":\"call_erODSRATWRUVpXslboZqmJcI\",\"type\":\"function\",\"function\":{\"name\":\"load_document_text\",\"arguments\":\"{}\"}}]},{\"role\":\"tool\",\"tool_call_id\":\"call_erODSRATWRUVpXslboZqmJcI\",\"content\":\"Exhibit
      10.1 Certain information identified by bracketed asterisks ([ * * * ]) has been
      omitted from this exhibit because it is both not material and would be competitively
      harmful if publicly disclosed. EXCLUSIVE LICENSE AND PRODUCT DEVELOPMENT AGREEMENT
      THIS EXCLUSIVE LICENSE AND PRODUCT DEVELOPMENT AGREEMENT (this \u201CAgreement\u201D)
      is entered into as of June 12, 2019 (the \u201CExecution Date\u201D) by and
      between Eton Pharmaceuticals, Inc., a Delaware corporation with offices at 21925
      W. Field Pkwy, Suite 235, Deer Park, Illinois, USA (\u201CETON\u201D), and Aucta
      Pharmaceuticals, Inc., a Delaware corporation with offices at 71 Suttons Lane,
      Piscataway, NJ 08854 (\u201CAucta\u201D) . RECITALS WHEREAS, ETON is engaged
      in the business of licensing, developing, marketing, distributing and selling
      pharmaceutical drug products\u037E WHEREAS, Aucta is engaged in the business
      of developing pharmaceutical drug products, including the Products (later defined)\u037E
      WHEREAS, ETON desires to obtain an exclusive license to the Products, the Dossiers
      (later defined), and Aucta Background Intellectual Property (later defined)
      for Marketing the Products in the Territory, and Aucta is willing to grant such
      an exclusive license to ETON under the terms and conditions set forth herein\u037E
      WHEREAS, ETON will pay Aucta certain milestone, royalty and licensing payments
      based on the sale of Products in the Territory under the terms and conditions
      set forth herein\u037E and WHEREAS, the parties hereto agree that, unless otherwise
      stated, the terms herein shall not be effective unless and until the Effective
      Date (later defined) occurs. NOW, THEREFORE, in consideration of the foregoing
      premises and the representations, warranties, covenants and agreements herein
      contained and other good and valuable consideration, the receipt and sufficiency
      of which are hereby acknowledged, ETON and Aucta, intending to be legally bound,
      hereby agree as follows: 1. DEFINITIONS. For the purposes of this Agreement,
      the following terms whether used in singular or plural form shall have the meanings
      as defined below: 1.1 \u201CAffiliates\u201D means, with respect to a Party
      or any Third Party, any corporation, firm, partnership or other entity that
      controls, is controlled by or is under common control with such entity. For
      the purposes of this definition, \u201Ccontrol\u201D means the ownership of
      at least 50% of the voting share capital of an entity or any other comparable
      equity or ownership interest. 1.2 \u201CANDA Litigation\u201D shall have the
      meaning ascribed to the term in Section 7.5.2 of this Agreement. Source: ETON
      PHARMACEUTICALS, INC., 10-Q, 11/14/2019 CONFIDENTIAL 1.3 \u201CApplicable Law\u201D
      means the applicable laws, rules, regulations, guidelines and requirements of
      any Governmental Entity related to the development, registration, manufacture,
      importation, commercialization of the Products in the Territory, the manufacture
      in and export from the Territory of Manufacture, or any obligation under, or
      related to, this Agreement, including those obligations applicable to the Dossiers.
      1.4 \u201CAucta Background Intellectual Property\u201D means any and all patents
      and trademarks, patent and trademark applications or other patent and trademark
      rights, copyrights, inventions, know-how, trade secrets, proprietary knowledge,
      data, formulations, product specifications and other information owned, licensed
      to or controlled by Aucta relating to the Products, including but not limited
      to use, manufacture, and packaging thereof. 1.5 \u201CAucta Indemnified Parties\u201D
      shall have the meaning ascribed to the term in Section 13.2 of this Agreement.
      1.6 \u201CBreaching Party\u201D shall have the meaning ascribed to the term
      in Section 11.2 of this Agreement. 1.7 \u201CBusiness Day\u201D means any day,
      other than Saturday, Sunday or other day on which commercial banks are authorized
      or required to close in New York, New York or Rome, Italy. 1.8 \u201CCalendar
      Quarter\u201D means a three (3) consecutive month period ending on March 31,
      June 30, September 30 or December 31. 1.9 \u201CClaim\u201D includes a claim,
      notice, demand, action, proceeding, litigation, prosecution, arbitration, investigation,
      judgment, award, damage, loss, cost, expense or liability however arising, whether
      present, unascertained, immediate, future or contingent, whether based in contract,
      tort or statute and whether involving a Third Party or a Party or otherwise.
      1.10 \u201CConfidential Information\u201D shall have the meaning ascribed to
      the term in Section 9.2 of this Agreement. 1.11 \u201CDossiers\u201D means the
      New Drug Applications pursuant to 21 U.S.C. \xA7355(b)(1)-(2), and all amendments
      and supplements thereof, for the Products as set forth in Exhibit A. 1.12 \u201CEffective
      Date\u201D shall have the meaning ascribed to the term in Section 11.1 of this
      Agreement. 1.13 \u201CETON Indemnified Parties\u201D shall have the meaning
      ascribed to the term in Section 13.1 of this Agreement. 1.14 \u201CFDA\u201D
      means the United States Food and Drug Administration and all divisions under
      its direct control or any successor organizations. 1.15 \u201CForce Majeure
      Events\u201D shall have the meaning ascribed to such term in Section 15.2 of
      this Agreement. 2 Source: ETON PHARMACEUTICALS, INC., 10-Q, 11/14/2019 CONFIDENTIAL
      1.16 \u201CGMP\u201D means current good manufacturing practices as defined by
      the FDA. 1.17 \u201CGovernmental Entity\u201D means any arbitrator, court, judicial,
      legislative, administrative, or regulatory agency, commission, department, board,
      or bureau or body or other government authority or instrumentality or any Person
      or entity exercising executive, legislative, judicial, regulatory, or administrative
      functions of or pertaining to government, whether foreign or domestic, whether
      federal, state, provincial, municipal, or other. 1.18 \u201CGross Sales\u201D
      shall have the meaning ascribed to the term in Section 1.26. 1.19 \u201CIndemnitee\u201D
      shall have the meaning ascribed to the term in Section 13.3.1 of this Agreement.
      1.20 \u201CIndemnitor\u201D shall have the meaning ascribed to the term in Section
      13.3.1 of this Agreement. 1.21 \u201CInfringement Notification Date\u201D shall
      have the meaning ascribed to the term in Section 7.4 of this Agreement. 1.22
      \u201CIntellectual Rights Suit\u201D shall have the meaning ascribed to the
      term in Section 7.4 of this Agreement. 1.23 \u201CLosses\u201D means all losses,
      costs, damages, judgments, settlements, interest, fees or expenses including,
      without limitation, all reasonable attorneys\u2019 fees, experts\u2019 or consultants\u2019
      fees, expenses and costs. 1.24 \u201CMarket\u201D or \u201CMarketing\u201D shall
      have the meaning ascribed to the term in Section 2.1 of this Agreement. 1.25
      \u201CNDC\u201D means a national drug code as issued by the FDA. 1.26 \u201CNet
      Sales\u201D means, with respect to each Product sold in the Territory, the aggregate
      gross sales amount invoiced by ETON or any sublicensee or other party authorized
      by ETON to wholesale or distribute the Products on an arms-length basis to Third
      Parties in the Territory (\u201CGross Sales\u201D), less (as applicable) the
      following ETON expenses as accrued and adjusted for amounts actually taken,
      consistent with ETON\u2019S standard accounting practices in accordance with
      GAAP: (a) amounts refunded or credited for returned, damaged, outdated, short-dated
      or defective goods, and bad debts, and (b) all of the following: (i) taxes,
      duties and other governmental charges related to the production, use or sale
      of the Products (including, including without limitation the brand manufacturer\u2019s
      tax imposed pursuant to the Patient Protection and Affordable Care Act (Pub.
      L. No. 111-148) as amended or replaced, but not including taxes assessed against
      the income derived from such sale)\u037E (ii) trade, quantity and cash discounts,
      allowances, retroactive price adjustments, credit incentive payments, chargebacks,
      patient support programs, and rebates (including governmental rebates or other
      price reductions provided, based on sales by ETON to any Governmental Entity
      or regulatory authority in respect of state or federal Medicare, Medicaid, government
      pricing or similar programs\u037E)\u037E and (iii) any costs incurred in connection
      with or arising out of compliance with any Risk Evaluation and Mitigation Strategies
      approved by the FDA and (iv) any expenses associated with serialization of the
      Products. Distribution of Licensed Products for clinical trials or as samples
      will not be deemed a \u201CNet Sale\u201D under this definition. 3 Source: ETON
      PHARMACEUTICALS, INC., 10-Q, 11/14/2019 CONFIDENTIAL 1.27 \u201CParty\u201D
      or \u201CParties\u201D means ETON or Aucta, as applicable. 1.28 \u201CPayment
      Period\u201D shall have the meaning ascribed to the term in Section 6.3.7 of
      this Agreement. 1.29 \u201CPerson\u201D means any individual, partnership (general
      or limited), association, corporation, limited liability company, joint venture,
      trust, estate, limited liability partnership, unincorporated organization, government
      (or any agency or political subdivision thereof) or other legal person or organization.
      1.30 \u201CPharmacovigilance Agreement\u201D shall have the meaning ascribed
      to the term in Section 3.4 of this Agreement. 1.31 \u201CProduct\u201D or \u201CProducts\u201D
      means a product or products set forth in Exhibit A for Marketing by or for ETON
      in the Territory (and covered or intended to be covered by a Dossier) and manufactured
      and supplied by Aucta (or a Third Party as permitted by this Agreement) to ETON
      in fully packaged and labeled form and ready for commercialization by ETON.
      1.32 \u201CRecall Event\u201D shall have the meaning ascribed to that term in
      Section 3.4 of this Agreement. 1.33 \u201CSale Representatives FTE\u201D shall
      have the meaning ascribed to the term in Section 5.4 of this Agreement. 1.34
      \u201CSpecification\u201D shall mean, for a particular Product, the specifications,
      methods and processes of the product, as set forth in the applicable Dossier
      for that Product. 1.35 \u201CTaxes\u201D means taxes, duties, fees, premiums,
      assessments, imposts, levies and other charges of any kind whatsoever imposed
      by any Governmental Entity, including all interest, penalties, fines, additions
      to tax or other additional amounts imposed by any Governmental Entity in respect
      thereof, and including those levied on, or measured by, or referred to as, income,
      gross receipts, profits, capital, transfer, land transfer, sales, goods and
      services, harmonized sales, use, value-added, excise, stamp, withholding, business,
      franchising, property, development, occupancy, employer health, payroll, employment,
      health, social services, education and social security taxes, all surtaxes,
      all customs duties and import and export taxes, countervail and anti-dumping,
      all license, franchise and registration fees and all employment insurance, health
      insurance and government pension plan premiums or contributions. 1.36 \u201CTerm\u201D
      shall have the meaning ascribed to this term in Section 11.1 of this Agreement.
      4 Source: ETON PHARMACEUTICALS, INC., 10-Q, 11/14/2019 CONFIDENTIAL 1.37 \u201CTerritory\u201D
      shall mean the fifty states of the United States of America, the District of
      Columbia, the Commonwealth of Puerto Rico, Guam, American Samoa, the U.S. Virgin
      Islands and all territories and possessions of the United States of America
      and United States military bases. 1.38 \u201CTerritory of Manufacture\u201D
      means the country where the Products is made. 1.39 \u201CThird Party\u201D means
      any Person other than ETON, Aucta or their respective Affiliates. 1.40 \u201CTransfer
      Taxes\u201D shall have the meaning ascribed to this term in Section 10 of this
      Agreement. 2. GRANT OF RIGHTS 2.1 Aucta, for itself and its Affiliates, hereby
      grants to ETON in accordance with the terms and conditions of this Agreement,
      an exclusive (even as to and against Aucta in the Territory) right and license,
      including the right to sublicense, to the Products (or any components thereof),
      Dossiers, and all current and future Aucta Background Intellectual Property
      that is owned or controlled by Aucta or its Affiliates for ETON to develop,
      manufacture, import, use, promote, distribute, market, advertise, offer for
      sale or sell (collectively, \u201CMarket\u201D) the Products in and for the
      Territory. For avoidance of doubt, Aucta and its Affiliates shall retain all
      rights to the Products outside the Territory, and Aucta shall remain at all
      times the owner of all Products, Dossier and Aucta Background Intellectual Property
      worldwide including the Territory. 2.2 ETON, for itself and its Affiliates,
      hereby grants to Aucta in accordance with the terms and conditions of this Agreement,
      a right and license, to its trademark, including to its name and logo, that
      is owned or controlled by ETON or its Affiliates for Aucta (or its authorized
      Third Party) to make the packs, labels, and leaflets for the Products for sale
      in the Territory. For avoidance of doubt, ETON and its Affiliates shall remain
      the owner of its trademarks. 3. PRODUCT DEVELOPMENT AND REGISTRATION 3.1 Development
      and Registration Responsibilities. 3.1.1 At its sole cost and expense, Aucta
      shall be responsible and liable for all development and manufacturing activities
      required for the filing and approval of the Dossiers for the Products in and
      for the Territory, including without limitation all costs and management of
      any required pre-approval and post-approval clinical or other studies. 3.1.2
      At its sole cost and expense, Aucta shall be responsible and liable for all
      regulatory activities required for the filing and approval of the Dossiers for
      the Products in and for the Territory. 3.1.3 Aucta shall provide to ETON all
      regulatory and compliance-related documents and correspondence with the FDA
      within five (5) Business Days after submission or receipt of such documents
      or correspondence with the FDA relating to the Products or Dossiers for the
      Products, including without limitation any oral (notes thereof) and written
      correspondence with FDA relating to the Products or Dossiers and any compliance-related
      oral (notes thereof) or written correspondence with FDA relating to the Product(s)\u2019
      manufacturing facility(ies)\u2019 status or deficiencies. 5 Source: ETON PHARMACEUTICALS,
      INC., 10-Q, 11/14/2019 CONFIDENTIAL 3.1.4 ETON will provide commercially reasonable
      support on regulatory activities, when requested by Aucta and necessary for
      approval. 3.2 Registration Maintenance and Regulatory Responsibilities. 3.2.1
      Aucta shall hold the approved Dossiers in its name and be responsible for their
      maintenance. Aucta will take all actions with the FDA, including paying all
      fees and conducting all communications with FDA or other Governmental Entities
      as required by Applicable Law in respect of the Dossiers, including without
      limitation payment of fees owed under the Prescription Drug User Fee Act, Annual
      Branded Prescription Drug Fees assessed under Section 9008 of the Patient Protection
      and Affordable Care Act (ACA), Public Law 111-148 (124 Stat. 119 (2010)), as
      amended by Section 1404 of the Health Care and Education Reconciliation Act
      of 2010 (HCERA), Public Law 111-152 (124 Stat. 1029 (2010)), or any successor
      laws, and preparing and filing all required reports (including adverse drug
      experience reports) with the appropriate Governmental Entity. 3.3 ETON\u2019s
      NDC Numbers. Aucta and its Affiliates shall not sell any products under ETON\u2019s
      or its Affiliates\u2019 names or NDC numbers. 3.4 Medical Inquires, Product
      Complaints and Recalls. ETON, Aucta and a designated third-party contract manufacturer
      shall share in the responsibility for responding to any medical inquiries or
      complaints about any Products or addressing any circumstances that may result
      in a potential recall, market withdrawal, inventory retrieval, or similar action
      (\u201CRecall Event\u201D) as set forth in the Pharmacovigilance Agreement attached
      hereto as Exhibit B (the \u201CPharmacovigilance Agreement\u201D) and to be
      entered into by the Parties and the contract manufacturer as soon as practicable.
      3.5 Competitive Products. During the Term of this Agreement, and for a period
      of two (2) years thereafter, Aucta shall not research, develop, manufacture,
      file, sell, market, or distribute more than two products containing the active
      ingredient Lamotrigine\u037E nor will Aucta directly or indirectly assist any
      other Person or entity in carrying or any such activities. [ * * * ] 4. MANUFACTURE
      AND SUPPLY 4.1 ETON shall enter into a commercial supply agreement with a contract
      manufacturing organization and Aucta shall enter into a commercial supply agreement
      with an active pharmaceutical ingredient supplier within ninety (90) days from
      the Execution Date unless otherwise agreed to by the parties in writing. 4.2
      If the terms of Aucta\u2019s commercial supply agreement with the active pharmaceutical
      ingredient supplier in Section 4.1 is assignable to ETON, ETON may assume the
      aforementioned agreement by providing written notice to Aucta, and Aucta will
      have seven (7) days from receipt of the notice to assign the aforementioned
      agreement to ETON. 6 Source: ETON PHARMACEUTICALS, INC., 10-Q, 11/14/2019 CONFIDENTIAL
      5. SALES, MARKETING AND DISTRIBUTION 5.1 ETON shall be solely responsible for
      the Marketing of the Products and shall have sole and exclusive right to make
      all Marketing decisions for the Product in the Territory, including without
      limitation to pricing, contracting, sub-licensing, co-promoting, or any contract
      promotion activities. 5.2 ETON shall use commercially reasonable efforts to
      Market the Products in the Territory during the Term of this Agreement. 5.3
      ETON shall have the sole and exclusive right to determine all terms and conditions
      of sale of the Products to its or its prospective consumers. 5.4 [ * * * ] 6.
      MILESTONES AND OTHER PAYMENTS 6.1 Licensing Fees. ETON shall pay to Aucta licensing
      fees of up to an amount of five million dollars ($5,000,000) based on the following
      payment schedule: (a) An amount of two million dollars ($2,000,000) within five
      (5) days of the Effective Date of this Agreement. (b) An amount of two million
      dollars ($2,000,000) within thirty (30) days after the first commercial sales
      of Product. [ * * * ] (c) An amount of one million dollars ($1,000,000) within
      thirty (30) days after the issuance and listing of a patent in the Orange Book
      for the Product and its Dossier, only if that patent is listed prior to the
      submission of an ANDA referencing the Product and its Dossier as the reference
      product. 6.2 Commercial Milestones. ETON shall pay to Aucta a total sum amount
      of up to eighteen million dollars ($18,000,000) based on Net Sales of a Product
      (on a Product by Product basis) after the achievement of the following one-time
      milestones for each Product: (a) An amount of one million dollars ($1,000,000)
      upon Net Sales first exceeding an amount of ten million dollars ($10,000,000)
      in a calendar year to be paid within sixty (60) days after the calendar year
      end. (b) An amount of two million dollars ($2,000,000) upon Net Sales first
      exceeding an amount of twenty million dollars ($20,000,000) in a calendar year
      to be paid within sixty (60) days after the calendar year end. (c) An amount
      of five million dollars ($5,000,000) upon Net Sales first exceeding an amount
      of fifty million dollars ($50,000,000) in a calendar year to be paid within
      sixty (60) days after the calendar year end. 7 Source: ETON PHARMACEUTICALS,
      INC., 10-Q, 11/14/2019 CONFIDENTIAL (d) An amount of ten million dollars ($10,000,000)
      upon Net Sales first exceeding an amount of one hundred million dollars ($100,000,000)
      in a calendar year to be paid within sixty (60) days after the calendar year
      end. 6.3 Royalty. 6.3.1 ETON shall pay to Aucta a royalty payment of [ * * *
      ] of Net Sales of the Products. 6.3.2 [ * * * ] 6.3.3 If the amount of royalty
      payment under Section 6.3.1 is less than the amount of royalty payment under
      Section 6.3.2, then ETON shall pay Aucta the difference between royalty payments
      in Sections 6.3.1 and 6.3.2 within sixty (60) days of the calendar year end,
      but in no event shall the difference paid be greater than the minimum amount
