# Shared PostgreSQL settings — single source of truth for all environments.
# Injected as postgres -c flags by docker-entrypoint-wrapper.sh.
# Memory-tuning settings (shared_buffers, work_mem, etc.) differ per
# environment and remain in the individual compose files.

# WARNING: shared_preload_libraries fully overrides postgresql.conf — it does NOT append.
# If you need additional preloaded extensions, add ALL of them here as a comma-separated list.
# Example: shared_preload_libraries = vector,pg_stat_statements
shared_preload_libraries = vector
max_parallel_maintenance_workers = 4
random_page_cost = 1.1
effective_io_concurrency = 200

# HNSW vector search
hnsw.iterative_scan = relaxed_order
hnsw.ef_search = 64
